<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orbital — Live Satellite Visualizer</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <canvas id="scene"></canvas>

      <header id="title">
        <h1>Orbital</h1>
        <p>Live satellites tracked in real time</p>
        <nav class="nav-links">
          <a href="index.html" class="active">Visualizer</a>
          <a href="learn.html">Learn</a>
          <a href="launches.html">Launches</a>
        </nav>
      </header>

      <div id="loading">Loading orbital data&hellip;</div>

      <aside id="panel">
        <h2>Find a satellite</h2>
        <div class="search-wrap">
          <input
            id="search"
            type="text"
            placeholder="Name or NORAD ID&hellip;"
            autocomplete="off"
            spellcheck="false"
          />
          <div id="search-results"></div>
        </div>

        <h2>Groups</h2>
        <div id="groups"></div>

        <h2>Time</h2>
        <div class="time-controls">
          <button data-rate="1">1&times;</button>
          <button data-rate="60">60&times;</button>
          <button data-rate="600">600&times;</button>
          <button data-rate="3600">3600&times;</button>
        </div>
        <div id="clock">—</div>
        <label class="toggle-row">
          <input id="shadow-toggle" type="checkbox" checked />
          Shade satellites in Earth&rsquo;s shadow
        </label>

        <h2>Add your own</h2>
        <div class="custom-controls">
          <div class="custom-row">
            <input id="catnr" type="text" inputmode="numeric" placeholder="NORAD ID, e.g. 25544" />
            <button id="catnr-go" type="button">Add</button>
          </div>
          <details class="tle-details">
            <summary>Paste TLE data</summary>
            <textarea
              id="tle-input"
              rows="4"
              placeholder="NAME&#10;1 25544U ...&#10;2 25544 ..."
            ></textarea>
            <button id="tle-go" type="button">Add satellites</button>
          </details>
          <div id="custom-msg" class="custom-msg"></div>
        </div>

        <div id="counts"></div>
      </aside>

      <div id="tooltip"></div>

      <aside id="detail" hidden>
        <button id="detail-close" aria-label="Close">&times;</button>
        <div id="detail-body"></div>
      </aside>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
